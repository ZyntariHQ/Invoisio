name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

env:
  MERCHANT_PUBLIC_KEY: ${{ secrets.MERCHANT_PUBLIC_KEY || 'GBRPYHIL2CI3WHGSUJX2BUXCLODYDQBMZ6RBR44RRY5ZWKZ6CAS3JZXR' }}

jobs:
  lint-and-test:
    name: Lint, Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb?schema=public
        run: npx prisma migrate deploy

      - name: Run Linter
        run: npm run lint

      - name: Run Format Check
        run: npm run format -- --check

      - name: Run Unit Tests
        env:
          MERCHANT_PUBLIC_KEY: ${{ env.MERCHANT_PUBLIC_KEY }}
        run: npm run test

      - name: Run E2E Tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb?schema=public
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
          MERCHANT_PUBLIC_KEY: ${{ env.MERCHANT_PUBLIC_KEY }}
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Upload Coverage Reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7
