name: Soroban Contract CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'soroban/**'
      - '.github/workflows/soroban.yml'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ "main" ]
    paths:
      - 'soroban/**'
      - '.github/workflows/soroban.yml'

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./soroban

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: soroban/client/package-lock.json

      - name: Cargo Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: soroban

      - name: Run Tests
        run: cargo test

      - name: Install Client Dependencies
        run: npm ci
        working-directory: ./soroban/client

      - name: Generate Client Bindings
        run: npm run generate:bindings:check
        working-directory: ./soroban/client

      - name: Build Client Package
        run: npm run build
        working-directory: ./soroban/client
